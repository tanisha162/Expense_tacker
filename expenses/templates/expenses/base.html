<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #534AB7 !important; }
        .navbar-brand { color: white !important; font-weight: bold; }
        .card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .btn-primary { background-color: #534AB7; border-color: #534AB7; }
        .btn-primary:hover { background-color: #3C3489; border-color: #3C3489; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand">💰 Expense Tracker</a>
        <div class="ms-auto">
            <span class="text-white me-3">👤 {{ request.user.username }}</span>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
