<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body{
            font-family: Arial;
            background: #4f46b5;
        }

        .box{
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button{
            width: 100%;
            padding: 12px;
            background: #4f46b5;
            color: white;
            border: none;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Expense Tracker Login</h1>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    {% if error %}
        <p style="color:red;">
            {{ error }}
        </p>
    {% endif %}

</div>

</body>
</html>
